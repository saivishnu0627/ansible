- name: default value
  hosts: localhost
  tasks:
  - name: print default value
    ansible.builtin.debug:
      msg: "Hello {{course | default('ansible') }}"

- name: upper case
  hosts: localhost
  vars:
    greetings: "Hello, Good Moring"
  tasks:
  - name: convert into uppercase
    ansible.builtin.debug:
      msg: "{{greetings | upper }}"

- name: lower case
  hosts: localhost
  vars:
    greetings: "Hello, Good Moring"
  tasks:
  - name: convert into lowercase
    ansible.builtin.debug:
      msg: "{{greetings | lower }}"

- name: remove duplicates
  hosts: localhost
  numbers: [1, 2, 4, 4, 6, 3, 5]
  tasks:
  - name: remove duplicates
    ansible.builtin.debug:
      msg: "{{numbers | unique }}"