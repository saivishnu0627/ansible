- name: default value
  hosts: localhost
  tasks:
  - name: print default value
    ansible.builtin.debug:
      msg: "Hello {{course | default('ansible') }}"

- name: upper case
  hosts: localhost
  vars:
    greetings: "Hello, Good Moring"
  tasks:
  - name: convert into uppercase
    ansible.builtin.debug:
      msg: "{{greetings | upper }}"

- name: lower case
  hosts: localhost
  vars:
    greetings: "Hello, Good Moring"
  tasks:
  - name: convert into lowercase
    ansible.builtin.debug:
      msg: "{{greetings | lower }}"

- name: remove duplicates
  hosts: localhost
  vars:
   numbers: [1, 2, 4, 4, 6, 3, 5]
  tasks:
  - name: remove duplicates
    ansible.builtin.debug:
      msg: "{{numbers | unique }}"

- name: print min and max
  hosts: localhost
  vars:
    ages: [23, 19, 21, 31, 45]
  tasks:
  - name: print min and max
    ansible.builtin.debug:
      msg: "min age: {{ages | min }}, max age: {{ages | max }}"

- name: convert dictionary into items/list
  hosts: localhost
  vars:
    my_dict: #this is called dictionary or map or key/value pairs
      Course: Ansible
      Trainer: Vishnu
      Duration: 2hr
  tasks:
  - name: before convert
    ansible.builtin.debug:
      msg: "before convert: {{ my_dict }}"
  - name: after convert
    ansible.builtin.debug:
      msg: "after convert: {{ my_dict | dict2items }}"

- name: convert items to dictionary
  hosts: localhost
  vars:
    my_list:
    - {'key': 'Course', 'value': 'Ansible'} 
    - {'key': 'Trainer', 'value': 'Vishnu'} 
    - {'key': 'Duration', 'value': '2hr'}
  tasks:
  - name: before convert
    ansible.builtin.debug:
      msg: "before convert: {{ my_list }}"
  - name: after convert
    ansible.builtin.debug:
      msg: "after convert: {{ my_list | items2dict }}" 