- name: default value
  hosts: localhost
  tasks:
  - name: print default value
    ansible.builtin.debug:
      msg: "Hello {{course | default('ansible') }}"

- name: upper case
  hosts: localhost
  vars:
    greetings: "Hello, Good Moring"
  tasks:
  - name: convert into uppercase
    ansible.builtin.debug:
      msg: "{{greetings | upper }}"